name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    defaults:
      run:
        shell: bash
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_DEFAULT_TIMEOUT: "60"
      PIP_RETRIES: "5"
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip wheel setuptools
          for attempt in 1 2 3; do
            if python -m pip install --prefer-binary -r requirements.txt; then
              break
            fi
            if [[ "$attempt" -eq 3 ]]; then
              exit 1
            fi
            echo "pip install failed on attempt $attempt; retrying after backoff"
            sleep $((attempt * 5))
          done
          python -m pip check

      - name: Ruff
        run: |
          set -euxo pipefail
          python -m ruff check src tests scripts evaluation

      - name: Pytest
        run: |
          set -euxo pipefail
          python -m pytest -ra --durations=20

      - name: Failure diagnostics
        if: failure()
        run: |
          set -x
          python --version
          python -m pip --version
          python -m pip freeze
