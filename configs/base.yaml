app:
  name: realtime-ml-drift
  env: dev
  seed: 42

streaming:
  source: synthetic          # synthetic | replay | kafka
  replay_path: data/raw/streams/dev_stream.jsonl
  event_rate_per_sec: 15
  max_events: 0              # 0 => run forever
  entity_cardinality: 800
  idempotency:
    dedupe_cache_size: 200000
  ingestion:
    queue_max_size: 5000
    drop_on_overflow: false
    lag_circuit_breaker_seconds: 5.0
  micro_batch:
    # Off by default for behavior parity; enable to reduce CPU via batched scoring.
    enabled: false
    batch_size: 128
    flush_ms: 50
  kafka:
    bootstrap_servers: "localhost:9092"
    topic: "rtml.events"
    group_id: "rtml-drift"
    dlq_topic: "rtml.events.dlq"
    poll_timeout_ms: 500
  drift:
    enabled: true
    drift_start_event: 4000
    drift_type: mean_shift_amount   # mean_shift_amount | new_category | bursty_entities

feature_engineering:
  window_seconds: 300
  max_events_per_entity: 500
  features:
    - cnt_5m
    - amt_sum_5m
    - amt_mean_5m
    - amt_std_5m
    - uniq_merchant_5m
    - uniq_country_5m
    - time_since_last
    - rate_per_min

model:
  type: isolation_forest     # isolation_forest | zscore
  warmup_events: 1500
  isolation_forest:
    n_estimators: 200
    contamination: 0.02
    random_state: 42

drift:
  reference_window_events: 2000
  current_window_events: 800
  window_size: 1000
  evaluation_interval: 200
  # Optional periodic expensive checks (KS/PSI) to cut CPU.
  periodic_expensive_checks_enabled: true
  check_interval_events: 200
  min_samples: 200
  threshold_method: adaptive   # adaptive | fixed
  threshold_k: 1.0
  fixed_score_threshold: 0.8
  feature_vote_fraction: 0.50
  smoothing_consecutive: 3
  alert_cooldown_events: 6
  baseline_min_evals: 20
  mean_shift_z_threshold: 2.5
  feature_threshold_k: 1.5
  adaptive_score_quantile: 0.90
  feature_alert_score_threshold: 0.65
  norm_cap: 3.0
  warning_enter_mult: 0.80
  warning_exit_mult: 0.60
  critical_enter_mult: 1.00
  critical_exit_mult: 0.80
  warning_vote_fraction: 0.20
  critical_vote_fraction: 0.35
  warning_consecutive: 1
  critical_consecutive: 3
  score_weights:
    psi: 0.5
    ks: 0.3
    prediction: 0.2
  feature_checks:
    ks_pvalue_threshold: 0.001
    psi_threshold: 0.25
  prediction_checks:
    ks_pvalue_threshold: 0.001
    psi_threshold: 0.25
    adwin:
      enabled: true
      delta: 0.002

adaptation:
  enabled: true
  target_anomaly_rate: 0.01
  min_history: 200
  initial_threshold: 0.9972
  min_threshold: 0.9971
  max_threshold: 0.999
  max_step: 0.0005
  cooldown_seconds: 5

monitoring:
  structured_logs: true
  log_level: INFO
  snapshot_interval_seconds: 120
  alert_buffer_size: 1000
  prometheus:
    enabled: true

api:
  host: 0.0.0.0
  port: 8000
  start_background_stream: true
  max_alerts_returned: 200
  max_request_bytes: 131072
  max_requests_per_minute_per_ip: 1200

state:
  restore_on_startup: true
  snapshot:
    enabled: true
    path: data/processed/state/snapshot.json
    interval_seconds: 60

security:
  # Dev default only. In production use gateway auth/mTLS and secret management.
  admin_api_key: "change-me"

benchmarking:
  # Production default: keep anomaly rate in a resume-defensible band (0.5%-2%).
  target_anomaly_rate: 0.01
  # Optional detector overrides for benchmark passes (null => keep runtime defaults).
  min_samples: null
  window_size: null
  evaluation_interval: null
  drift_scenario:
    enabled: true
    drift_start_event: 4000
    drift_type: mean_shift_amount
  performance_compare_enabled: false
  micro_batch_size: 128
  performance_compare_target_eps: 900
  # Safety valve for alert storms in benchmark reporting.
  max_alerts_per_minute: 120
