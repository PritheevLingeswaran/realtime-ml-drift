version: "3.9"

services:
  api:
    build: .
    environment:
      - CONFIG_PATH=configs/dev.yaml
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  # Optional: Kafka API compatible broker (Redpanda).
  # Not required for core functionality; included to mirror real deployments.
  redpanda:
    image: redpandadata/redpanda:v24.2.8
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
